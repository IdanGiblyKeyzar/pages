<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Pages - Test Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      max-width: 480px;
      width: 90%;
    }

    .icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 2rem;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    p {
      color: #555;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 8px 20px;
      background: #667eea;
      color: #fff;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .link {
      display: inline-block;
      margin-top: 16px;
      color: #667eea;
      font-size: 0.95rem;
      text-decoration: none;
      font-weight: 500;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F680;</div>
    <h1>GitHub Pages Works!</h1>
    <p>This page is live and served by <strong>GitHub Pages</strong>.</p>
    <p>Your repository is set up correctly.</p>
    <span class="badge">&#x2705; Deployment successful</span>
    <br />
    <a class="link" href="md/test.md">&#x1F4C4; View test.md</a>
  </div>
</body>
</html>
