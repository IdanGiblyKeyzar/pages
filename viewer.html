<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --header-bg: #0f172a;
      --header-text: #f8fafc;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --code-bg: #f1f5f9;
    }

    html { font-size: 16px; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .site-header {
      background: var(--header-bg);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .site-header .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--header-text);
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-decoration: none;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
      color: #fff;
    }

    .site-header .tag {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(37,99,235,.25);
      color: #93c5fd;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(147,197,253,.2);
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .breadcrumb a:hover { text-decoration: underline; }

    .breadcrumb svg {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    /* ── Viewer card ── */
    .viewer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .viewer-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
    }

    .viewer-card-header svg {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .viewer-card-header .file-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      word-break: break-all;
    }

    .viewer-body {
      padding: 32px 40px;
    }

    /* ── Markdown ── */
    #md-content {
      line-height: 1.75;
      color: var(--text-primary);
      font-size: 0.9375rem;
    }

    #md-content h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 0.75em; }
    #md-content h2 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.01em; margin: 1.8em 0 0.5em; padding-bottom: 0.4em; border-bottom: 1px solid var(--border); }
    #md-content h3 { font-size: 1rem; font-weight: 600; margin: 1.5em 0 0.4em; }
    #md-content h4, #md-content h5, #md-content h6 { font-size: 0.9rem; font-weight: 600; margin: 1.2em 0 0.3em; color: var(--text-secondary); }

    #md-content p { margin: 0.75em 0; color: var(--text-primary); }
    #md-content ul, #md-content ol { padding-left: 1.4em; margin: 0.6em 0; }
    #md-content li { margin: 0.3em 0; }

    #md-content a { color: var(--accent); text-decoration: none; }
    #md-content a:hover { text-decoration: underline; }

    #md-content code {
      background: var(--code-bg);
      color: #be185d;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.84em;
    }

    #md-content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 18px 20px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1em 0;
    }

    #md-content pre code {
      background: none;
      color: var(--text-primary);
      padding: 0;
      font-size: 0.85em;
    }

    #md-content blockquote {
      border-left: 3px solid var(--accent);
      background: var(--accent-light);
      padding: 10px 16px;
      margin: 1em 0;
      border-radius: 0 6px 6px 0;
      color: var(--text-secondary);
    }

    #md-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75em 0;
    }

    #md-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 0.875rem;
    }

    #md-content th, #md-content td {
      border: 1px solid var(--border);
      padding: 8px 14px;
      text-align: left;
    }

    #md-content th {
      background: #fafbfc;
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    #md-content img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }

    /* Checkbox list items */
    #md-content input[type="checkbox"] {
      margin-right: 6px;
      accent-color: var(--accent);
    }

    /* ── Plain text ── */
    #text-content {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.85rem;
      line-height: 1.65;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
    }

    /* ── PDF / image ── */
    #pdf-content {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 8px;
    }

    #img-content {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: block;
      margin: 0 auto;
    }

    /* ── Fallback download ── */
    .download-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 56px 0;
      color: var(--text-muted);
    }

    .download-box svg {
      width: 40px;
      height: 40px;
      color: var(--text-muted);
    }

    .download-box p { font-size: 0.875rem; }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 22px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: background 0.15s;
    }

    .download-btn:hover { background: #1d4ed8; }

    /* ── Error ── */
    .error {
      color: #dc2626;
      font-size: 0.875rem;
      padding: 24px 0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 600px) {
      main { margin: 24px auto; }
      .viewer-body { padding: 20px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="brand" href="index.html">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h12a2 2 0 012 2v2H2V6zm0 4h16v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/></svg>
      </div>
      File Index
    </a>
    <span class="tag">GitHub Pages</span>
  </header>

  <main>
    <nav class="breadcrumb">
      <a href="index.html">Index</a>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
      <span id="breadcrumb-name"></span>
    </nav>

    <div class="viewer-card">
      <div class="viewer-card-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>
        <span class="file-title" id="filename"></span>
      </div>
      <div class="viewer-body">
        <div id="viewer"></div>
      </div>
    </div>
  </main>

  <footer>
    Served via <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a>
  </footer>

  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get('file');

    if (!file) {
      document.getElementById('viewer').innerHTML =
        '<p class="error">No file specified. Use <code>?file=public/path/to/file</code>.</p>';
    } else {
      const name = file.split('/').pop();
      const ext = name.split('.').pop().toLowerCase();
      document.title = name + ' — File Index';
      document.getElementById('filename').textContent = name;
      document.getElementById('breadcrumb-name').textContent = name;

      const viewer = document.getElementById('viewer');

      const TEXT_TYPES = ['md', 'txt', 'csv', 'json', 'xml', 'yaml', 'yml', 'toml', 'ini', 'log', 'sh', 'py', 'js', 'ts', 'html', 'css', 'java', 'go', 'rs', 'rb', 'php', 'swift', 'kt', 'c', 'cpp', 'h'];
      const IMAGE_TYPES = ['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp', 'avif', 'bmp', 'ico'];

      if (ext === 'pdf') {
        viewer.innerHTML = `<iframe id="pdf-content" src="${encodeURI(file)}"></iframe>`;
      } else if (IMAGE_TYPES.includes(ext)) {
        viewer.innerHTML = `<img id="img-content" src="${encodeURI(file)}" alt="${name}" />`;
      } else if (ext === 'md') {
        fetch(file)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
          .then(text => {
            const div = document.createElement('div');
            div.id = 'md-content';
            div.innerHTML = marked.parse(text);
            viewer.appendChild(div);
          })
          .catch(() => {
            viewer.innerHTML = '<p class="error">Could not load file.</p>';
          });
      } else if (TEXT_TYPES.includes(ext)) {
        fetch(file)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
          .then(text => {
            const pre = document.createElement('pre');
            pre.id = 'text-content';
            pre.textContent = text;
            viewer.appendChild(pre);
          })
          .catch(() => {
            viewer.innerHTML = '<p class="error">Could not load file.</p>';
          });
      } else {
        viewer.innerHTML = `
          <div class="download-box">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17v3a1 1 0 001 1h16a1 1 0 001-1v-3"/></svg>
            <p>No preview available for <strong>.${ext}</strong> files.</p>
            <a class="download-btn" href="${encodeURI(file)}" download="${name}">
              Download ${name}
            </a>
          </div>`;
      }
    }
  </script>
</body>
</html>
