<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 48px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      max-width: 820px;
      margin: 0 auto;
    }

    .back {
      display: inline-block;
      margin-bottom: 24px;
      color: #667eea;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .back:hover { text-decoration: underline; }

    .filename {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      word-break: break-all;
    }

    /* Markdown */
    #md-content h1, #md-content h2, #md-content h3,
    #md-content h4, #md-content h5, #md-content h6 {
      margin: 1.2em 0 0.4em; color: #1a1a2e;
    }
    #md-content p  { margin: 0.6em 0; line-height: 1.7; color: #333; }
    #md-content ul, #md-content ol { padding-left: 1.5em; margin: 0.6em 0; color: #333; line-height: 1.7; }
    #md-content code { background: #f4f4f8; padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
    #md-content pre { background: #f4f4f8; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
    #md-content pre code { background: none; padding: 0; }
    #md-content blockquote { border-left: 4px solid #667eea; padding-left: 16px; color: #666; margin: 1em 0; }
    #md-content a { color: #667eea; }
    #md-content hr { border: none; border-top: 1px solid #eee; margin: 1.5em 0; }
    #md-content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    #md-content th, #md-content td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    #md-content th { background: #f4f4f8; font-weight: 600; }
    #md-content img { max-width: 100%; border-radius: 8px; }

    /* Plain text */
    #text-content {
      background: #f4f4f8;
      border-radius: 8px;
      padding: 24px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.88rem;
      line-height: 1.6;
      color: #333;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
    }

    /* PDF / image embeds */
    #pdf-content {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 8px;
    }

    #img-content {
      max-width: 100%;
      border-radius: 8px;
      display: block;
      margin: 0 auto;
    }

    /* Fallback */
    .download-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 48px 0;
      color: #888;
    }
    .download-box .icon { font-size: 3rem; }
    .download-btn {
      display: inline-block;
      padding: 10px 24px;
      background: #667eea;
      color: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .download-btn:hover { opacity: 0.85; }

    .error {
      color: #e55;
      font-style: italic;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <a class="back" href="index.html">&#8592; Back to index</a>
    <div class="filename" id="filename"></div>
    <div id="viewer"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get('file');

    if (!file) {
      document.getElementById('viewer').innerHTML =
        '<p class="error">No file specified. Use <code>?file=public/path/to/file</code>.</p>';
    } else {
      const name = file.split('/').pop();
      const ext = name.split('.').pop().toLowerCase();
      document.title = name;
      document.getElementById('filename').textContent = name;

      const viewer = document.getElementById('viewer');

      const TEXT_TYPES = ['md', 'txt', 'csv', 'json', 'xml', 'yaml', 'yml', 'toml', 'ini', 'log', 'sh', 'py', 'js', 'ts', 'html', 'css', 'java', 'go', 'rs', 'rb', 'php', 'swift', 'kt', 'c', 'cpp', 'h'];
      const IMAGE_TYPES = ['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp', 'avif', 'bmp', 'ico'];

      if (ext === 'pdf') {
        viewer.innerHTML = `<iframe id="pdf-content" src="${encodeURI(file)}"></iframe>`;
      } else if (IMAGE_TYPES.includes(ext)) {
        viewer.innerHTML = `<img id="img-content" src="${encodeURI(file)}" alt="${name}" />`;
      } else if (ext === 'md') {
        fetch(file)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
          .then(text => {
            const div = document.createElement('div');
            div.id = 'md-content';
            div.innerHTML = marked.parse(text);
            viewer.appendChild(div);
          })
          .catch(() => {
            viewer.innerHTML = '<p class="error">Could not load file.</p>';
          });
      } else if (TEXT_TYPES.includes(ext)) {
        fetch(file)
          .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
          .then(text => {
            const pre = document.createElement('pre');
            pre.id = 'text-content';
            pre.textContent = text;
            viewer.appendChild(pre);
          })
          .catch(() => {
            viewer.innerHTML = '<p class="error">Could not load file.</p>';
          });
      } else {
        viewer.innerHTML = `
          <div class="download-box">
            <span class="icon">&#x1F4BE;</span>
            <p>No preview available for <strong>.${ext}</strong> files.</p>
            <a class="download-btn" href="${encodeURI(file)}" download="${name}">Download ${name}</a>
          </div>`;
      }
    }
  </script>
</body>
</html>
